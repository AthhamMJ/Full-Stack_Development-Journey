<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movie.com</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="glass">
    <label for="time">Duration in Minutes: </label>
    <input type="text" name="time" id="time"><br><br>
    <button onclick="cube()">Calculate</button><br>
    
    <h3 id="result"></h3>
    </div>
    <script>
    function cube(){
    let time = Number(document.getElementById("time").value);
    let hour = time / 60;
    let min = time % 60;
    document.getElementById("result").innerText = "The Duration is : " + hour + " hour " + min +" minutes";
}
    </script>
</body>
</html>
