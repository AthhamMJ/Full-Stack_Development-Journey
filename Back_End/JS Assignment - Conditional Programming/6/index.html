<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopkeeper.com</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="glass">
    <label for="col">Column item: </label>
    <input type="text" name="col" id="col"><br><br>
    <label for="row">Row item: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
    <input type="text" name="row" id="row"><br><br>
    <button onclick="compare()">Calculate</button><br>
    
    <h3 id="result"></h3>
    </div>
    <script>
    function compare(){
    let c = Number(document.getElementById("col").value);
    let r = Number(document.getElementById("row").value);

    let t = c * r;

    document.getElementById("result").innerText = "The Toatal Items are: " + t;
}
    </script>
</body>
</html>
