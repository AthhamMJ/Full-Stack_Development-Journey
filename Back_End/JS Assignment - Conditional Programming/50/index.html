<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offer.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass">
        <label for="total">Total Purchase:</label>
        <input type="text" id="total"><br><br>

        <button onclick="offer()">Calculate</button><br>

        <h3 id="result"></h3>
    </div>

    <script>
        function offer() {

            let total = Number(document.getElementById("total").value);

            let discount = 0;

            if (total >= 2000 && total <= 3000) {
                discount = total * 0.10;
            }
            else if (total > 3000 && total <= 5000) {
                discount = total * 0.25;
            }
            else if (total > 5000 && total <= 6000) {
                discount = total * 0.40;
            }
            else if (total >= 7000) {
                discount = total * 0.47;
            }

            if (discount > 0) {
                let amount = total - discount;

                document.getElementById("result").innerText =
                    "Discount: Rs." + discount +
                    " | Final Amount: Rs." + amount;
            }
            else {
                document.getElementById("result").innerText =
                    "There is no offer for Rs." + total;
            }
        }
    </script>

</body>
</html>
