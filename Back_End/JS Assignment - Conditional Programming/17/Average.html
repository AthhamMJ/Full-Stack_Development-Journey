<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass">

        <label for="mark1">Mark 1:</label>
        <input type="text" id="mark1"><br><br>

        <label for="mark2">Mark 2:</label>
        <input type="text" id="mark2"><br><br>

        <label for="mark3">Mark 3:</label>
        <input type="text" id="mark3"><br><br>

        <button onclick="avg()">Calculate</button>

        <h3 id="result"></h3>

    </div>

    <script>
        function avg() {

            let m1 = Number(document.getElementById("mark1").value);
            let m2 = Number(document.getElementById("mark2").value);
            let m3 = Number(document.getElementById("mark3").value);

            let average = (m1 + m2 + m3) / 3;

            document.getElementById("result").innerText =
                "The Average Mark is: " + average;
        }
    </script>

</body>
</html>
