<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>engineer.com</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="glass">
    <label for="side">Size of side of a Sqaure: </label>
    <input type="text" name="side" id="side"><br><br>
    <button onclick="area()">Calculate</button><br>
    
    <h3 id="result"></h3>
    </div>
    <script>
    function area(){
    let side = Number(document.getElementById("side").value);
    let area = side * side;

    document.getElementById("result").innerText = "The Area Of Sqaure is: " + area + " units sqaure";
}
    </script>
</body>
</html>
