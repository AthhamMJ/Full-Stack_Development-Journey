<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vipconstructures.com</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="glass">
    <label for="side1">One side's lenght: </label>
    <input type="text" name="side1" id="side1"><br><br>
    <label for="side2">Other side's size: </label>
    <input type="text" name="side2" id="side2"><br><br>
    <button onclick="cube()">Calculate</button><br>
    
    <h3 id="result"></h3>
    </div>
    <script>
    function cube(){
    let side1 = Number(document.getElementById("side1").value);
    let side2 = Number(document.getElementById("side2").value);
    let area = side1 * side2;

    document.getElementById("result").innerText = "The Area Of Room is: " + area + " units square";
}
    </script>
</body>
</html>
