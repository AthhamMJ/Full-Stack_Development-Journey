<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sum2num</title>
</head>
<body>
    Number 1: <input type="number" placeholder="Enter 1st Nombre" id="num1"><br><br>
    Number 2: <input type="number" placeholder="Enter 2nd Nombre" id="num2"><br><br>
    <button onclick="dosum()">+</button>
    <h3 id="result"></h3>


    <script>
        function dosum(){
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);

            let sum = n1 + n2;
            document.getElementById("result").innerText = "ADD " + sum;

        }
    </script>
</body>
</html>
