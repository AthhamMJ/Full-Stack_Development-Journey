<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forums.com</title>
    <style>
        body{
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(239, 255, 201)
        }
        .glass{

            background: rgba(255, 255, 255, 0.2);

            border-radius: 28px;

            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            padding: 20px;
            
            border: 1px solid rgba(255, 255, 255, 0.35);

            box-shadow:
            inset 0 2px 2px rgba(255,255,255,0.5),
            inset 0 -2px 8px rgba(0,0,0,0.03);
        }
        input::placeholder{
            color: rgba(30, 30, 30, 30, 0.45);
            font-weight: 400;
        }
    </style>
</head>
<body>
    <input type="text" class="glass" placeholder="Enter Here ...">
</body>
</html>
