<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator.com</title>
    <style>
        body{
            background-color: rgb(221, 255, 221);
        }
        button{
            padding: 20px;
            margin: 8px;

            width: 40px;
            height: 40px;

            outline: none;
            border: none;

            border-radius: 18px;
            background: rgba(255, 255, 255, 0.1);
            border-color: 1px solid rgba(255, 255, 255, 255, 0.35);

            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            box-shadow:
            inset 0 2px 4px rgba(255,255,255,0.5),
            inset 0 -2px 4px rgba(0,0,0,0.03);
            font-size: large;
        }
        fieldset{
            width: 300px;
            height: 400px;
            border-radius: 30px 30px 30px 30px;
            background-color: rgb(26, 26, 26);

            outline: none;
            border: none;
        }
        input{
            border-style: solid rgb(0, 0, 0);
            width: 200px;
            height: 40px;
            border-color: rgb(0, 0, 0);
            border-radius: 20px 20px 20px 20px; /* TL TR BR BL */
            background: rgb(255, 255, 255, 0.35);

            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            color: aliceblue;
            text-align: right;
            font-size: larger;

            outline: none;
            border: none;

            box-shadow:
            inset 0 2px 8px rgba(255,255,255,0.5),
            inset 0 -2px 8px rgba(0,0,0,0.03);

        }
        body{
            font-family: poppins;
            font-size: medium;
            background-color: black;
        }
    </style>
</head>
<body>
    <center>
        <fieldset><br>
        <input type="number" id="num"><br><br><br>
        <button id="1">1</button><button id="2">2</button><button id="3">3</button><button id="+" style="background-color: rgb(255, 204, 0);">+</button><br>
        <button id="4">4</button><button id="5">5</button><button id="6">6</button><button id="-" style="background-color: rgb(255, 204, 0);">-</button><br>
        <button id="7">7</button><button id="8">8</button><button id="9">9</button><button id="x" style="background-color: rgb(255, 204, 0);">x</button><br>
        <button id="0">0</button><button id="=">=</button><button id="c" style="background-color: rgb(255, 0, 0);">C</button><button id="/" style="background-color: rgb(255, 204, 0);">/</button>
        </fieldset>
    </center>
</body>
</html>
