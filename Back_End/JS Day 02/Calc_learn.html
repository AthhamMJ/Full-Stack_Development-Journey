<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator.com.us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-color: rgb(38, 38, 38);
        }
        
        body{
            height: 100vh;

            display: flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            background:
            linear-gradient(
                135deg,
                #dff7ae,
                #c7f5dc,
                #e9fff2
            );
        }
    </style>
</head>
<body>
    <center>
        <fieldset><br>
        <input type="number" id="num" class="display"><br><br><br>
        <button id="1">1</button><button id="2">2</button><button id="3">3</button><button id="+">+</button><br>
        <button id="4">4</button><button id="5">5</button><button id="6">6</button><button id="-">-</button><br>
        <button id="7">7</button><button id="8">8</button><button id="9">9</button><button id="x">x</button><br>
        <button id="0">0</button><button id="=">=</button><button id="c" >C</button><button id="/">/</button>
        </fieldset>
    </center>
</body>
</html>
