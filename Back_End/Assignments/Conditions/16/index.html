<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heattour.com</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="glass">
    <label for="f">Enter The Heat (Fharhenit): </label>
    <input type="text" name="f" id="f"><br><br>
    <button onclick="cube()">Calculate</button><br>
    
    <h3 id="result"></h3>
    </div>
    <script>
    function cube(){
    let f = Number(document.getElementById("f").value);
    let c = (f-32) * 5 / 9;

    document.getElementById("result").innerText = "The Heat is : " + c + " Fahrenheit.";
}
    </script>
</body>
</html>
