<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>car.com</title>
</head>
<style>
    body{
        background-color: green;
        position: relative;
        padding: 0;
        margin: 0;
    }
    .road{
        display: flex;
        flex-direction: column;
        height: 310px;
        width: 100%;
        position: relative;
        top: 600px;
        z-index: 1;
       

    }
    .roadside1{
        height: 150px;
        background-color: rgb(36, 36, 36);
    }
    .roadside2{
        height: 150px;
        background-color: rgb(36, 36, 36);
    }
    .roadgap{
        height: 10px;
        background-color: white;
    }
    .car{
        position: absolute;
        top: 600px;
        left: 0;
        display: flex;
        animation: drive1 1s linear infinite;
        z-index: 10;
    }
    .chasis{
        width: 200px;
        height: 100px;
        background-color: red;
        border-radius: 20px;
        border-top-right-radius: 70px;
        border-top-left-radius: 50px;
        position: relative;
    }
    .carbody{
        width: 350px;
        height: 70px;
        background-color: red;
        position: absolute;
        bottom: 0;
        left: -50px;
        border-radius: 20px;
        border-top-right-radius: 100px;
        border-top-left-radius: 50px;
    }
    .wheel{
        position: absolute;
        bottom: -20px;
        left: 0;
        width: 70px;
        height: 70px;
        border-radius: 50px;
        background-color: black;
    }
    .car2{
        animation: drive 2s linear infinite;
        position: absolute;
        /* background-color: red; */
        top: 300px;
        left: 100px;
    }
    @keyframes drive{
        0%{
           transform: translateX(0); 
        }
        100%{
            transform: translateX(3000px);
        }
    }
    @keyframes drive1{
        0% {
            transform: translate(0px, 0px);
        }

        20% {
            transform: translate(600px, 80px);
        }

        80% {
            transform: translate(2400px, 80px);
        }

        100% {
            transform: translate(3000px, 0px);
        }
    }
</style>
<body>
    <div class="road">
        <div class="roadside1"></div>
        <div class="roadgap"></div>
        <div class="roadside1"></div>
    </div>
    <div class="car">
        <div class="chasis"></div>
        <div class="carbody"></div>
        <div class="wheel"></div>
        <div class="wheel" style="position: absolute; left: 170px;"></div>
    </div>
<div style="position:relative;left: 0;width:500px;height:290px; z-index: 100;" class="car2">

<div style="position:absolute;bottom:10px;left:60px;width:380px;height:25px;background:rgba(0,0,0,0.25);border-radius:50%;filter:blur(10px);"></div>

            <div style="position:absolute;bottom:50px;left:50px;width:400px;height:90px;background:linear-gradient(90deg,#C40000,#FF3B3B);border-radius:30px 60px 20px 20px;border:4px solid #800000;"></div>

            <div style="position:absolute;bottom:120px;left:140px;width:180px;height:70px;background:linear-gradient(90deg,#D10000,#FF5C5C);clip-path:polygon(15% 100%,0 100%,15% 20%,35% 0,80% 0,100% 40%,100% 100%);border:4px solid #800000;"></div>

            <div style="position:absolute;bottom:130px;left:160px;width:65px;height:40px;background:#9be7ff;clip-path:polygon(15% 100%,0 100%,15% 20%,35% 0,100% 0,100% 100%);"></div>

            <div style="position:absolute;bottom:130px;left:235px;width:70px;height:40px;background:#9be7ff;clip-path:polygon(0 0,70% 0,100% 40%,100% 100%,0 100%);"></div>

            <div style="position:absolute;bottom:55px;left:250px;width:3px;height:80px;background:#700;"></div>

            <div style="position:absolute;bottom:90px;left:430px;width:18px;height:12px;background:#fff8a6;border-radius:0 50% 50% 0;box-shadow:0 0 15px yellow;"></div>

            <div style="position:absolute;bottom:90px;left:50px;width:12px;height:20px;background:#ff5050;border-radius:4px;"></div>

            <div style="position:absolute;bottom:20px;left:100px;width:80px;height:80px;background:#111;border-radius:50%;border:5px solid #444;">

            </div>

            <div style="position:absolute;bottom:20px;left:320px;width:80px;height:80px;background:#111;border-radius:50%;border:5px solid #444;">

</div>
</body>
</html>
