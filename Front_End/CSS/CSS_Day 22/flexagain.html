<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexagain.com</title>
</head>
<style>
    *{
        border-radius: 18px;
        
    }
    body{
        display: flex;
        justify-content: center;
    }
    .container{
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 900px;
    }
    .row1{
    display: flex;
    width: 100%;
    height: 150px;
    gap: 10px;
    }
        .row1col1{
            flex: 1;
            background-color: yellow;
        }
        .row1col2{
            flex: 3;
            background-color: crimson;
        }
    .row2{
        display: flex;
        width: 100%;
        height: 300px;
        gap: 10px;
    }
        .row2flex1{
            display: flex;
            gap: 10px;
            flex-direction: column;
            flex: 5;
            /* background-color:red; */
        }
        .row2flex1col1{
            height: 150px;
            background-color: crimson;
        }
        .row2flex1col2{
            display: flex;
            gap: 10px;
            height: 150px;
        }
            .row2flex1col1breaK1{
                flex: 1;
                background-color: yellow;
            }
            .row2flex1col1breaK2{
                flex: 1;
                background-color: yellow;
            }
        .row2flex2{
            display: flex;
            flex: 1;
            background-color: aquamarine;
        }
    .row3{
        display: flex;
        width: 100%;
        height: 150px;
        gap: 10px;
    }
        .row3col1{
            display: flex;
            gap: 10px;
            flex: 5;
        }
            .row3col1break1{
                flex: 4;
                background-color: blue;
            }
            .row3col1break2{
                flex: 1;
                background-color: orange;
            }
        .row3col2{
            display: flex;
            background-color: orange;
            flex: 1;
        }
    .row4{
        display: flex;
        width: 100%;
        height: 150px;
        gap: 10px;
    }
        .row4col1{
            background-color: aquamarine;
            flex: 5;
        }
        .row4col2{
            flex: 1;
            background-color: blue;
        }

</style>
<body>
    <div class="container">
        <div class="row1">
            <div class="row1col1"></div>
            <div class="row1col2"></div>
        </div>

        <div class="row2">
            <div class="row2flex1">
                <div class="row2flex1col1">
                </div>
                <div class="row2flex1col2">
                    <div class="row2flex1col1breaK1"></div>
                    <div class="row2flex1col1breaK2"></div>
                </div>
            </div>
            <div class="row2flex2"></div>
        </div>

        <div class="row3">
            <div class="row3col1">
                <div class="row3col1break1"></div>
                <div class="row3col1break2"></div>
            </div>
            <div class="row3col2"></div>
        </div>
        <div>
        <div class="row4">
            <div class="row4col1"></div>
            <div class="row4col2"></div>
            </div>
        </div>
    </div>
</body>
</html>
