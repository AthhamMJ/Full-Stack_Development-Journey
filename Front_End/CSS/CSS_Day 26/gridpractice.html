<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicegrid.org</title>
</head>
<style>
    *{
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: aliceblue;
        font-size: small;
    }
    .flex{
        display: flex;
    }
    .container-topic{
        background-color: rgb(8, 32, 66);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 220px;
    }
    .container-main{
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 10px;
        background-color: aliceblue;
    }
    .topic-box{
        display: flex;
        margin-top: 10px;
        height: 35px;
        width: 170px;
        border-radius: 8px;
        background-color: rgba(255, 255, 255, 0.25);
        justify-content: center;
        align-items: center;
    }
    .row1{
        background-color: rgb(0, 0, 0);
        height: 100px;
        width: 100%;
        border-radius: 12px;
    }
    .row2{
        display: flex;
        gap: 10px;
        justify-content: center;
    }
        .row2-col{
            background-color: rgb(255, 255, 255);
            height: 120px;
            width: 200px;
            border-radius: 12px;
        }
    .row3{
        background-color: white;
        height: 100px;
        border-radius: 12px;
    }
    .row4{
        background-color: white;
        height: 100px;
        border-radius: 12px;
    }


</style>
<body>
    <div class="flex">
        <div class="container-topic">
                <div class="topic-box">LOGO</div>
                <div class="topic-box">Dashboard</div>
                <div class="topic-box">Users</div>
                <div class="topic-box">Products</div>
                <div class="topic-box">Orders</div>
                <div class="topic-box">Reports</div>
                <div class="topic-box">Settings</div>

                <div class="topic-box" style="background-color: red; margin-top: 300px;">Logout</div>
        </div>

        <div class="container-main">
            <div class="row1"></div>
            <div class="row2">
                <div class="row2-col"></div>
                <div class="row2-col"></div>
                <div class="row2-col"></div>
                <div class="row2-col"></div>
            </div>
        </div>
    </div>
</body>
</html>
