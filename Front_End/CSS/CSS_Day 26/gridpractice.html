<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicegrid.org</title>
</head>
<style>
    *{
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: aliceblue;
        font-size: small;
    }
    .flex{
        display: flex;
    }
    .container-topic{
        background-color: rgb(8, 32, 66);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 250px;
        height: 1000px;
    }
    .container-main{
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 10px;
        background-color: aliceblue;
        position: relative;
    }
    .topic-box, .logout{
        display: flex;
        margin-top: 10px;
        height: 35px;
        width: 170px;
        border-radius: 8px;
        background-color: rgba(255, 255, 255, 0.25);
        justify-content: center;
        align-items: center;
    }

    .logout{
        background-color: red;
        font-weight: bold;
        position: absolute;
        bottom: 20px;
    }
    .row1{
        display: flex;
        justify-content: center;
        
        height: 100px;
        width: 100%;
        border-radius: 12px;
        margin: 10px;

        background-color: rgb(255, 255, 255);        
    }
    .row2{
        display: flex;
        gap: 10px;
        justify-content: center;
    }
        .row2-col{
            margin: 10px;
            background-color: rgb(255, 255, 255);
            height: 120px;
            width: 100%;
            border-radius: 12px;
        }
        
    .row3{
        display: flex;
        gap: 10px;
        justify-content: center;
    }
        .row3-col1, .row3-col2{
            margin: 10px;
            background-color: rgb(255, 255, 255);
            height: 300px;
            width: 100%;
            border-radius: 12px;
            flex: 5;
        }
        .row3-col2{
            flex: 1;
        }

    .row4{
        background-color: white;
        height: 100px;
        border-radius: 12px;
    }


</style>
<body>
    <div class="flex">
        <div class="container-topic">
                <div class="topic-box">LOGO</div>
                <div class="topic-box">Dashboard</div>
                <div class="topic-box">Users</div>
                <div class="topic-box">Products</div>
                <div class="topic-box">Orders</div>
                <div class="topic-box">Reports</div>
                <div class="topic-box">Settings</div>

                <div class="logout">Logout</div>
        </div>

        <div class="container-main">
            <div class="row1"></div>

            <div class="row2">
                <div class="row2-col"></div>
                <div class="row2-col"></div>
                <div class="row2-col"></div>
                <div class="row2-col"></div>
            </div>

            <div class="row3">
                <div class="row3-col1"></div>
                <div class="row3-col2"></div>
            </div>
        </div>
    </div>
</body>
</html>
