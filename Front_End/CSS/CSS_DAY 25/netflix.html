<style>
    *{
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
        color: aliceblue;
        font-size: small;
    }
    body{
        background-color: black;
    }
    nav{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: transparent;
        border-bottom: 0.25px solid rgba(255, 255, 255, 0.18);
        padding: 2rem 1rem;
        position: sticky;
        z-index: 10;

        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
    }
    .svg-nav{
        width: 10px;
        height: 10px;
        padding: 0px 20px;
    }
    a{
        color: aliceblue;
        text-decoration: none;
        padding: 0px 20px;
        font-size: smaller;
    }
    h4{
        color: aliceblue;
    }
    .main-image{
        display: flex;
        flex-direction: column;

        background-image: url(bat.jpg);
        background-size: cover;
        height: 500px;
        width: 100%;
        
        position: absolute;
        top: 0;

    }
    .svg-netflix{
        height: 60px;
        width: 200px;
        position: absolute;
        top: 0;
    }
    .contend{
        color: aliceblue;
        width: 500px;
        text-align: left;
        position: relative;
        top: 100px;
        left: 100px;
        line-height: 50px;
    }
    span{
        color: red;
    }
    h1{
        font-size: 50px;
        letter-spacing: 1px;
    }
    .button-row{
        display: flex;
        gap: 15px;
    }
    .button-watch, .button-addlist{
        width: 100px;
        height: 30px;
        background-color: red;
        border-radius: 28px;
        border: none;
        font-size: smaller;
        border: 0.5px solid rgba(255, 255, 255, 0.4);
        box-shadow:
        inset 0 0.5px 0.5px rgba(255,255,255,0.5),
        inset 0 -0.5px 0.5px rgba(255, 255, 255, 0.2);
    }
    .button-addlist{
        background-color: black;
    }
    .svg-button{
        width: 10px;
        height: 10px;
        padding: 0px 10px;
    }
</style>
