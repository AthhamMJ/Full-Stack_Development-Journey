    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        background-color: black;
        background-image: url(gym.jpg);
        background-size: cover;
        position: relative;
    }
    .overlay {
        position: fixed; /* Stay in place */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5); /* Semi-transparent black */
        display: none; /* Hidden by default */
        z-index: 999; /* On top of other elements */
        }

        /* Content inside overlay */
        .overlay-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 8px;
    }
    .nav{
        display: flex;
        padding: 15px;
        justify-content: space-between;
        align-items: center;
        background: rgba(0,0,0,0.5);
        color: aliceblue;
        position: fixed;  
        width: 100%;          /* Stays at top */
        top: 0;
        left: 0;
        z-index: 1000;
    }
    a{
        color: rgba(255, 255, 255, 0.80);
        text-decoration: none;
        font-family: poppins;
        font-size: smaller;
        margin-left: 20px;
    }
    .button-join, .button-trial{
        background: #ff0000;
        color: white;

        border: none;
        border-radius: 14px;

        padding: 10px 18px;

        font-size: 18px;
        font-weight: 600;

        cursor: pointer;
    }
    h4{
        font-family: arial;
        font-size: large;
        position: relative;
        right: 90px;
    }
    .button{
        width: 120px;
        height: 30px;

        background: rgba(255, 0, 0, 0.45);
        border: 1px solid red;

        border-radius: 28px;

        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);

        color: aliceblue;

    }
    .mid-button{
        justify-content: center;
        text-align: center;
        margin-top: 50px;
    }
    .contend{
        display: flex;
        margin-top: 150px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: poppins;
    }
    h1{
        color: aliceblue;
        font-size: 60px;
    }
    span{
        color: red;
    }
    p{
        color: aliceblue;
        font-family: poppins;
        text-align: center;
    }
    .svg-tumble{
        height: 40px;
        width: 40px;
    }
    .svg{
        height: 15px;
        width: 15px;
        position: relative;
        top: 3px;
        opacity: 75%;
