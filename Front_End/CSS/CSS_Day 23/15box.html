<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15box.com</title>
</head>
<style>
    body{
        display: flex;
        flex-direction: column;
    }
    .container{
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 10px;
        max-width: 700px;
    }
    .box{
        background-color: blue;
        color: aliceblue;
        text-align: center;
        line-height: 50px;
        height: 50px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow:
            inset 0 1px 1px rgba(255,255,255,0.5),
            inset 0 -2px 1px rgba(255, 255, 255, 0.2);

        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
    }
</style>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
        <div class="box">11</div>
        <div class="box">12</div>
        <div class="box">13</div>
        <div class="box">14</div>
        <div class="box">15</div>
    </div>
</body>
</html>
