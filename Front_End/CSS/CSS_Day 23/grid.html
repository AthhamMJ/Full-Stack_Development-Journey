<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid.com</title>
</head>
<style>
    
    body{
        display: flex;
        gap: 10px;
    }
    .container{
        display: grid;
        gap: 10px;
        width: 500px;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 100px 50px 100px;
        position: absolute;
    }
    .box{
        background-color: black;
        color: aliceblue;
        text-align: center;
        height: 50px;
        line-height: 50px;
    }
</style>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
    </div>
</body>
</html>
