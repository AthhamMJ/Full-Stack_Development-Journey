<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridbox.com</title>
</head>
<style>
body{
    background-color: black;
}
.container{
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr 1fr;
    width: 440px;
    height: 440px;
}
.box{
    display: flex;
    background-color: black;
    text-align: center;
    justify-content: center;
    align-items: center;
    color: aliceblue;
    font-size: large;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow:
        inset 0 2px 2px rgba(255,255,255,0.5),
        inset 0 -2px 2px rgba(255, 255, 255, 0.2);

    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
}

.col{
    grid-column: 2/4;
}
.row{
    grid-row: 1/3;
}
</style>
<body>
    <div class="container">
        <div class="box row" style="background-color: red;">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box col" style="background-color: purple;">7</div>
    </div>
</body>
</html>
