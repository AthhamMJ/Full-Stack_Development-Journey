<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flower.com</title>
</head>
<style>
    body{
        display: flex;
    }
    .center-flower{
        width: 100px;
        height: 100px;
        background-color: yellow;
        border-radius: 70px;
        position: relative;
        top: 100px;
        left: 100px;
        z-index: 3;
        border: 10px solid orchid;
    }
    .fin1{
        width: 80px;
        height: 80px;
        border-radius: 40px;
        background-color: rgb(0, 0, 0);
        position: absolute;
        top: -80px;
        left: 10px;
        z-index: 1;

    }
    .fin2{
        width: 80px;
        height: 80px;
        border-radius: 40px;
        background-color: palevioletred;
        position: absolute;
        top: 10px;
        left: -80px;
        z-index: 1;
    }
    .fin3{
        width: 80px;
        height: 80px;
        border-radius: 40px;
        background-color: palevioletred;
        position: absolute;
        top: 100px;
        left: 10px;
        z-index: 1;
    }
    .fin4{
        width: 80px;
        height: 80px;
        border-radius: 40px;
        background-color: palevioletred;
        position: absolute;
        top: 10px;
        left: 100px;
        z-index: 1;
    }
</style>
<body>
    <div>
        <div class="center-flower">
            <div class="fin1"></div>
            <div class="fin2"></div>
            <div class="fin3"></div>
            <div class="fin4"></div>
        </div>
    </div>
</body>
</html>
