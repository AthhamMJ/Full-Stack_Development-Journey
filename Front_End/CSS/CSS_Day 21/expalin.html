<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>explain.com</title>
</head>
<style>
    body{
        background-color: black;
    }
    .container{
        width: 1100px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .row1 ,.row2flex1col1, .row2flex1col2, .row2flex2col1, .row2flex2col2{
        border-radius: 28px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        box-shadow:
            inset 0 2px 2px rgba(255,255,255,0.5),
            inset 0 -2px 2px rgba(255, 255, 255, 0.2);

        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
    }
    .row1{
        height: 200px;
        width: 100%;
        background-color: black;
        transform: translateY(-2px);

    }
    .row1:hover,.row2flex1col1:hover, .row2flex1col2:hover, .row2flex2col1:hover, .row2flex2col2:hover{
        transform: scale(1.015);
    }
    .row2{
        width: 100%;
        height: 500px;
        display: flex;
        gap: 15px;
    }
        .row2flex1{
            display: flex;
            flex: 1;
            gap: 15px;
            flex-direction: column;
        }
            .row2flex1col1{
                flex: 2;
                background-color: red;
            }
            .row2flex1col2{
                flex: 3;
                background-color: yellow;
            }
        .row2flex2{
            display: flex;
            flex: 1;
            gap: 15px;
            flex-direction: column;
        }
            .row2flex2col1{
                flex: 4;
                background-color: purple;
            }
            .row2flex2col2{
                flex: 1;
                background-color: brown;
            }
</style>
<body>
    <div class="container">
        <div class="row1"></div>
        <div class="row2">
            <div class="row2flex1">
                <div class="row2flex1col1"></div>
                <div class="row2flex1col2"></div>
            </div>
            <div class="row2flex2">
                <div class="row2flex2col1"></div>
                <div class="row2flex2col2"></div>
            </div>
        </div>
    </div>
</body>
</html>
