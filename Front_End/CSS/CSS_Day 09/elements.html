<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blockelements</title>
    <style>
        .block{
            background-color: blue;
            color: aliceblue;
            margin: 10px;
            display: block;
        }
        .inline{
            background-color: blueviolet;
            width: 150px;
            height: 50px;
        }
    </style>
</head>
<body>
    <a href="google.com" class="block">Like</a>
    <a href="google.com" class="block">Comment</a>
    <a href="google.com" class="block">Share</a>

    <span class="inline">Max</span>
    <span class="inline">Charles</span>
</body>
</html>
