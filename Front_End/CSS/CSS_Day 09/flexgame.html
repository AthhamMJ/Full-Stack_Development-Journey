<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexgame.com</title>
    <style>
        .container{
            width: 1035px;
        }
        .row1{
            gap: 10px;
            background-color: crimson;
            margin-bottom: 10px;
            height: 100px;
        }
        .row2{
            gap: 10px;
            display: flex;
        }
        .row3{
            gap: 10px;
            background-color: crimson;
            margin-top: 10px;
            height: 100px;
        }
        .flex1{
            flex: 2;
            height: 200px;
            background-color: crimson;
        }
        .flex2{
            flex: 1;
            height: 200px;
            background-color: crimson;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="row1"></div>
        <div class="row2">
            <div class="flex1"></div>
            <div class="flex2"></div>
        </div>
        <div class="row3"></div>
    </div>
</body>
</html>
