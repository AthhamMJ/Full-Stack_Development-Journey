<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boxmodels.com</title>
    <style>
        img{
            width: 600px;
            height: 400px;

            border: 1px solid rgb(135, 135, 135 ,0.35);

            box-shadow:
            inset 0 2px 2px rgba(255,255,255,0.5),
            inset 0 -2px 2px rgba(150, 150, 150, 0.1);
            
            border-radius: 28px 28px 28px 28px;
            
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            padding: 20px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.1);

}
        body{
            background-color: rgba(0, 0, 0);
}
        l.letter{
           border: 1px solid rgb(135, 135, 135 ,0.35);

            box-shadow:
            inset 0 2px 1px rgba(255,255,255,0.5),
            inset 0 -2px 1px rgba(150, 150, 150, 0.1);
            
            border-radius: 28px 28px 28px 28px;
            
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            padding: 20px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.1);
            
            font-family: poppins;
            
            color: rgb(145, 145, 145);
}
    </style>
</head>
<body>
    <img src="Ford-Mustang_Shelby_GT350.jpg" alt="Ford-Mustang_Shelby_GT350"><br><br>
    <l class="letter" style="padding: 10px; margin: 20px;">Athham_Stark</l> 
    <l class="letter" style="padding: 20px; margin: 60px;">Ken_Miles</l> 
    <l class="letter" style="padding: 30px; margin: 60px;">Carol_Shelby</l>
</body>
</html>
